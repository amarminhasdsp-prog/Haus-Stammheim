server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip fuer Text-Assets (Performance-Budget: kleinere Transfergroesse)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # Statische Assets mit Hash im Dateinamen (Vite-Build-Output) langfristig cachen
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA-Routing: alle unbekannten Pfade an index.html durchreichen,
    # damit React Router (BrowserRouter) Client-seitig auf tiefen
    # Routen wie /grundriss oder /bewerbung funktioniert.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html selbst nie cachen, damit neue Deploys sofort greifen
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
